<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudoclasses</title>
    <style>
        .caixas
        {
            display: inline-block;
            background-color: rgb(121, 121, 121);
            border: 1px solid black;
            text-align: center;
            height: 200px;
            width: 200px;
        }
        .caixas:hover
        {
            background-color: rgb(21, 21, 70);
        }
        #ugabuga:hover
        {
            color: #ff0000;

        }
        #ugabuga > p
        {
            display: none;
        }
        #ugabuga:hover > p
        {
            display: block;
            font-size: 50px;
        }
        #ugabuga:hover > h2
        {
            display: none;
        }
    </style>
</head>
    <body>
        <div class="caixas">1</div>
        <div class="caixas">2</div>
        <div class="caixas">3</div>
        <div id="ugabuga">
            passe o mouse por cima
            <p>ugabuga</p>
            <h2>aaaa</h2>

        </div>
    </body>
</html>
