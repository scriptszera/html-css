<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Align Self</title>
    <style>
        *
        {
            margin: 0px;
            padding: 0px;
        }
        main
        {
            background-color: darkgray;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-flow: row nowrap;
            justify-content: flex-start;
            align-items: flex-start;
        }
        .letras
        {
            background-color: rgb(70, 70, 70);
            text-align: center;
            border: 1px solid black;
            

        }
        #A
        {
            /* flex-shrink: 0;
            flex-grow: 0; */
            flex: 0 0 150px;
        }
        #B
        {
            /* flex-shrink: 1;
            flex-grow: 2; */
            flex: 2 1 150px;
        }
        #C
        {
            /* flex-shrink: 2;
            flex-grow: 1; */
            flex: 1 2 150px;
        }
        #obs
        {
            align-self: flex-end;
            flex: 1 1 100px;
        }
    </style>
</head>
    <body>
        <main>
            <section class="letras" id="A">A</section>
            <section class="letras" id="B">B</section>
            <section class="letras" id="C">C</section>
            <section id="obs"><H1>OBS:.Você pode abreviar tudo isso com: <br>" flex: flex-grow + flex-shrink + flex-basis "</H1></section>
        </main>
    </body>
</html>
