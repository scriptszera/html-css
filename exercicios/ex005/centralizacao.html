<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centralização</title>
    <style>
        *, html
        {
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
            transition: 0.25s;
        }
        main
        {
            background-color: rgb(90, 90, 90);
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-flow: row wrap;
            justify-content: center;
            align-items: center;
            align-content: center;
            
        }
        section
        {
            background-color: rgb(167, 167, 167);
            width: 400px;
            height: 400px;
            text-align: center;
        }
        img
        {
            width: 400px;
            height: 400px;
        }
        @media screen and (min-width: 992px)
        {
            main
            {
                flex-flow: row-reverse wrap;
            }


        }
    </style>
</head>
    <body>
        <main>
            <section>
                <img src="../ex004/desafio-tela-de-login/imagem.jpg">
            </section>
            <section>
                    <h1>Login</h1>
                    <p>Seja bem-vindo(a) novamente, Faça o login para acessar sua conta e poder fazer as configurações no seu ambiente</p>
                    <form action="login.php" method="post">
                        <label for="email-id">
                            email
                            <input type="email" name="email" id="email-id" placeholder=" Seu Email" required>
                        </label>
                        <br>
                        <label for="senha-id">
                            senha
                            <input type="password" name="senha" id="senha-id"
                            placeholder=" Sua Senha" required maxlength="10" minlength="5">
                        </label>
                        <br>
                        <input id="entrar" type="submit" value="Entrar">
                        <br>
                        <a href="">Esqueci a senha</a>
                    </form>
            </section>
        </main>
    </body>
</html>
