<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matérias</title>
    <style>
        *
        {margin: 0px;
        padding: 0px;}
        
        th, td
        {border: 1px solid black;}

        th
        {padding: 5px 25px;
        background-color: gray;
        color: #ffffff;
        font-weight: bold;
        text-align: center;}
        
        table
        {border-collapse: collapse;
        font-family: Arial, Helvetica, sans-serif;}

        tbody>tr>td
        {padding: 2px 0px;
        text-align: center;}

        .area
        {font-weight: bold;
        text-align: center;}

        .destaque
        {background-color: gray;
        color: #ffffff;
        font-weight: bolder;}

        .c1
        {background-color: aqua;}

    </style>
</head>
    <body>
        <table>
            <colgroup>
                <col class="c1" span="5">
            </colgroup>
            <thead>
                <tr>
                    <th scope="col" rowspan="2">Área</th>
                    <th scope="col" rowspan="2">Disciplinas</th>
                    <th scope="colgroup" colspan="2">Notas</th>
                    <th scope="col" rowspan="2">Médias</th>
                </tr>
                <tr>
                    <th>Nota 1</th>
                    <th>Nota 2</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="area" rowspan="5">Exatas</td>
                </tr>
                <tr>
                    <td>Matemática</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <td>Física</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    
                </tr>
                <tr>
                    <td>Química</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <td>Biologia</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr class="destaque">
                    <th scope="row" colspan="4">Média de Exatas </th>
                    <td>0.0</td>
                </tr>
                <tr>
                    <td class="area" rowspan="2">Humanas</td>
                    <td>História</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr>
                    <td>Geografia</td>
                    <td>0.0</td>
                    <td>0.0</td>
                    <td>0.0</td>
                </tr>
                <tr class="destaque">
                    <th scope="row" colspan="4">Média de Humanas</th>
                    <td>0.0</td>
                </tr>
                                
            </tbody>
        </table>
    </body>
</html>
