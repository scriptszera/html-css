<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>color, range e file</title>
</head>
    <body>
        <h1>Formulários</h1>
        <form action="formulario.php" method="post">
            <p>
                <input type="color" name="color" id="idcolor" value="#ffffff"> <label for="idcolor">escolha uma cor</label>
            </p>
            <p>
                <input type="range" name="range" id="idrange" max="5" value="5"> <label for="idrange">nível de satisfação</label>
            </p>
            <p>
                <input type="file" name="imagem" id="idfile"><br><label for="idfile">selecione um arquivo</label>
            </p>
            <p>
                <input type="reset" value="Limpar">
                <input type="submit" value="Enviar">
            </p>
        </form>

    </body>
</html>
