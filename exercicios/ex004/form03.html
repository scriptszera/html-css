<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atributos/valores de Formulários</title>
    <style>

    nav
    {background-color: rgba(255, 1, 1, 0.534);
    padding: 5px;}

    nav a
    {margin-left: 10px;}

    body
    {background-color: whitesmoke;}

    </style>
</head>
    <body>
        <header>
            <nav>
                <a href="#">Home</a>
            </nav>

        </header>
        <h1>Complete:</h1>

        <form action="#" method="get" autocomplete="on">

            <p><label for="inum">Números:</label>
            <input type="number" name="num" id="inum" max="10" min="0" step="0.1"></p>   

            <p><label for="mes">Mês:</label>
            <input type="month" name="mes" id="mes" min="2000-01" value="2020-05"></p>

            <p><label for="data">Data Xadrez: </label><input type="date" name="data" id="data" step="2"></p>

            <p><label for="semana">Semana: </label><input type="week" name="semana" id="semana" min="2026-W10"></p>

            <p><label for="hora">Hora: </label><input type="time" name="hora" id="hora" min="10:50"></p>      

            <input type="reset" value="Limpar">
            <input type="submit" value="Próximo">

        </form>

    </body>
</html>
