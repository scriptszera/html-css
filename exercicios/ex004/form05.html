<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkbox e Radio button</title>
</head>
    <body>
        
    <form action="formulario.php">
        <h1>Checkbox e Radio button</h1>
        <fieldset>

            <legend>Sexo</legend>

            <input type="radio" name="sexo" id="sxmas" value="M"><label for="sxmas">Macho</label>
            <br>
            <input type="radio" name="sexo" id="sxfem" value="F"><label for="sxfem">Fêmea</label>
        
        </fieldset>
        <br>
        <fieldset>

            <legend>Esportes Favoritos</legend>
            <input type="checkbox" name="futebol" id="idfutebol" checked>
            <label for="idfutebol">
            Futebol
            </label><br>
            <input type="checkbox" name="basquete" id="idbasquete">
            <label for="idbasquete">
            Basquete
            </label><br>
            <input type="checkbox" name="volei" id="idvolei">
            <label for="idvolei">
            Vôlei
            </label><br>
            <input type="checkbox" name="natacao" id="idnatacao">
            <label for="idnatacao">
            Natação
            </label>

        </fieldset>            
        <br>
        <input type="reset" value="Limpar">
        <input type="submit" value="Enviar">

    </form>

    </body>
</html>
