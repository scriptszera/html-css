<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iframes001</title>
    <style>

    iframe
    {border: 1px solid black;
    max-width: 1200px;
    height: 50vh;
    width: 80vw;
    position: absolute;
    top: 15%;
    left: 0%;}

    ul> li
    {font-size: 2em;}

    </style>
</head>
    <body>
        <h1>faça sua escolha</h1>
        <ul>
            <li><a href="https://www.wikipedia.org" target="iframezao">Wikipedia</a></li>
            <li><a href="https://www.youtube.com/embed/y6CKgnBYs5E?si=g8w9o79_ectjADnw" target="iframezao">Video 1?</a></li>
            <li><a href="https://www.youtube.com/embed/9EqtC-xH5Sk?si=oh3KU9OgcgwLGcSz" target="iframezao">Video 2?</a></li>
        </ul>
            <div>
                <p>
                    <p>
                        <iframe name="iframezao" frameborder="0" srcdoc="<h1>Conteúdo Padrão: <p>selecione algum dos links acima.</p></h1>">
                        
                        <p>Infelizmente seu Navegador não pode exibir isto</p>
                        
                        </iframe>
                        <iframe src="#" frameborder="0" sandbox="allow-same-origin"
                        referrerpolicy="no-referrer"></iframe>
                    </p>
                </p> 
            </div>
        
    </body>
</html>
